<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Infinity Math</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 :root {
   --red: #cc0000;
   --red-dark: #990000;
   --red-bright: #ff1a1a;
   --black: #000000;
   --black-card: #111111;
   --black-card2: #161616;
   --white: #ffffff;
   --gray: #aaaaaa;
   --gray-dim: #555555;
   --font: 'Press Start 2P', cursive;
 }
 html { scroll-behavior: smooth; }
 body {
   background-color: var(--black);
   color: var(--white);
   font-family: var(--font);
   min-height: 100vh;
   overflow-x: hidden;
 }
 header {
   background: #000;
   padding: 0 24px;
   position: sticky;
   top: 0;
   z-index: 100;
   box-shadow: 0 4px 24px rgba(0,0,0,0.8);
   display: flex;
   align-items: center;
   justify-content: space-between;
   height: 70px;
   border-bottom: 2px solid rgba(255,255,255,0.12);
 }
 .logo-wrap {
   display: flex;
   align-items: center;
   gap: 12px;
 }
 .logo-text {
   color: var(--white);
   font-size: 0.72rem;
   line-height: 1;
   text-shadow: 0 2px 6px rgba(0,0,0,0.4);
 }
 .hero {
   background: #000;
   padding: 50px 24px 40px;
   text-align: center;
 }
 .hero h1 {
   font-size: clamp(0.75rem, 2vw, 1.3rem);
   color: #fff;
   margin-bottom: 14px;
   line-height: 1.8;
 }
 .hero p {
   font-size: 0.48rem;
   max-width: 520px;
   margin: 0 auto 28px;
   line-height: 2.2;
   color: #fff;
 }
 .search-bar {
   display: flex;
   max-width: 460px;
   margin: 0 auto;
 }
 .search-bar input {
   flex: 1;
   background: #000;
   border: 2px solid #fff;
   border-radius: 8px 0 0 8px;
   padding: 12px 14px;
   font-family: var(--font);
   font-size: 0.48rem;
   color: #fff;
 }
 .search-bar input::placeholder { color: #888; }
 .search-bar input:focus { outline: none; border-color: #fff; }
 .search-bar button {
   background: #000;
   border: 2px solid #fff;
   border-left: none;
   border-radius: 0 8px 8px 0;
   padding: 12px 16px;
   font-family: var(--font);
   font-size: 0.48rem;
   color: #fff;
   cursor: pointer;
 }
 .search-bar button:hover { background: #222; }
 main {
   max-width: 1280px;
   margin: 0 auto;
   padding: 36px 24px 60px;
 }
 .section-title {
   font-size: 0.62rem;
   color: var(--white);
   margin-bottom: 20px;
   display: flex;
   align-items: center;
   gap: 10px;
 }
 .section-title::after {
   content: '';
   flex: 1;
   height: 1px;
   background: linear-gradient(90deg, #2a2a2a, transparent);
 }
 .game-grid {
   display: grid;
   grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
   gap: 16px;
 }
 .game-card {
   background: var(--black-card);
   border: 2px solid #222;
   border-radius: 10px;
   overflow: hidden;
   cursor: pointer;
   transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
   padding-bottom: 10px;
 }
 .game-card:hover {
   border-color: var(--red);
   transform: translateY(-4px);
   box-shadow: 0 8px 24px rgba(204,0,0,0.35);
 }
 .game-thumb {
   width: 100%;
   aspect-ratio: 16/9;
   background: #00001a;
   display: flex;
   align-items: center;
   justify-content: center;
   overflow: hidden;
   position: relative;
 }
 .game-thumb img {
   width: 100%;
   height: 100%;
   object-fit: cover;
 }
 .play-overlay {
   position: absolute;
   inset: 0;
   background: rgba(0,0,0,0.55);
   display: flex;
   align-items: center;
   justify-content: center;
   font-size: 1.6rem;
   opacity: 0;
   transition: opacity 0.2s;
 }
 .game-card:hover .play-overlay { opacity: 1; }
 .game-name {
   font-size: 0.42rem;
   color: var(--white);
   text-align: center;
   padding: 8px 6px 0;
   line-height: 1.7;
 }
 .game-modal-bg {
   display: none;
   position: fixed;
   inset: 0;
   z-index: 999;
   background: #000;
   flex-direction: column;
 }
 .game-modal-bg.open { display: flex; }
 .game-modal-header {
   background: #000;
   display: flex;
   align-items: center;
   justify-content: space-between;
   padding: 10px 18px;
   flex-shrink: 0;
 }
 .game-modal-title {
   font-size: 0.52rem;
   color: var(--white);
 }
 .fullscreen-btn {
   background: rgba(0,0,0,0.4);
   border: 1px solid rgba(255,255,255,0.2);
   border-radius: 6px;
   color: var(--white);
   cursor: pointer;
   font-family: var(--font);
   font-size: 0.42rem;
   padding: 6px 12px;
   margin-left: 8px;
 }
 .fullscreen-btn:hover { background: rgba(204,0,0,0.6); }
 .game-modal-close {
   background: rgba(0,0,0,0.4);
   border: 1px solid rgba(255,255,255,0.2);
   border-radius: 6px;
   color: var(--white);
   cursor: pointer;
   font-family: var(--font);
   font-size: 0.42rem;
   padding: 6px 12px;
 }
 .game-modal-close:hover { background: rgba(204,0,0,0.6); }
 .gameFrame {
   flex: 1;
   width: 100%;
   border: none;
 }
 footer {
   background: var(--black-card);
   border-top: 1px solid #222;
   padding: 28px 24px;
   text-align: center;
 }
 .footer-logo {
   font-size: 0.55rem;
   color: var(--white);
   margin-bottom: 14px;
 }
 .footer-links {
   display: flex;
   justify-content: center;
   gap: 16px;
   flex-wrap: wrap;
   margin-bottom: 14px;
 }
 .footer-links a {
   color: #fff;
   text-decoration: none;
   font-size: 0.38rem;
 }
 .footer-links a:hover { color: #ccc; }
 footer p {
   font-size: 0.35rem;
   color: #fff;
   line-height: 2;
 }
</style>
</head>
<body>

<header>
 <div class="logo-wrap">
   <div class="logo-text" style="font-size:26px;">∞ Infinity Math</div>
 </div>
</header>

<section class="hero">
 <h1>Infinity<em></em><br></h1>
 <p>Nutella Official had a falloff of 2026 BSS History so . . . This Is The Website</p>
 <div class="search-bar">
   <input type="text" id="searchInput" placeholder="Search games…" oninput="searchGames(this.value)" />
   <button onclick="searchGames(document.getElementById('searchInput').value)">Search</button>
 </div>
</section>

<main>
 <div class="section-title">🎮 All Games</div>
 <div class="game-grid" id="homeGrid"></div>
</main>

<!-- Embedding modal -->
<div id="gameModal" class="game-modal-bg">
 <div class="game-modal-header" style="background:#000;">
   <div class="game-modal-title" id="gameTitle"></div>
   <div style="display:flex; align-items:center;">
     <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
     <button class="game-modal-close" onclick="closeGame()">✕ Close</button>
   </div>
 </div>
 <iframe id="gameFrame" class="gameFrame" src="" allowfullscreen></iframe>
</div>

<footer>
 <div class="footer-logo"><span>Infinity</span> Math</div>
 <div class="footer-links">
   <a href="#">Home</a>
   <a href="#">Privacy</a>
   <a href="#">Terms</a>
   <a href="#">Contact</a>
   <a href="#">DMCA</a>
 </div>
 <p>© 2025 Infinity Math · All games are property of their respective owners.</p>
</footer>

<script>
 // --- Existing game loader code (Among Us) ---
 let amongUsBlobUrl = null;
 async function getAmongUsUrl() {
   if (amongUsBlobUrl) return amongUsBlobUrl;
   const html = `<!DOCTYPE html><html><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mamayaya1/game@f3a882424a8f28d07bdf456b251d889725c4c1e4/projects/among-us/style.css"/>
</head><body>
<script>window.addEventListener("keydown",function(e){if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code)>-1){e.preventDefault();}},false);<\/script>
<script src="https://cdn.jsdelivr.net/gh/mamayaya1/game@f3a882424a8f28d07bdf456b251d889725c4c1e4/projects/among-us/scripts/supportcheck.js"><\/script>
<script src="https://cdn.jsdelivr.net/gh/mamayaya1/game@f3a882424a8f28d07bdf456b251d889725c4c1e4/projects/among-us/scripts/offlineclient.js" type="module"><\/script>
<script src="https://cdn.jsdelivr.net/gh/gahaden/ags@4f1a2b8755bcbf67ba043a7eca6c2e05d0b5bfe5/main.js" type="module"><\/script>
<script src="https://cdn.jsdelivr.net/gh/mamayaya1/game@f3a882424a8f28d07bdf456b251d889725c4c1e4/projects/among-us/scripts/register-sw.js" type="module"><\/script>
</body></html>`;
   const blob = new Blob([html], { type: "text/html" });
   amongUsBlobUrl = URL.createObjectURL(blob);
   return amongUsBlobUrl;
 }

 // --- Game catalogue ---
 const games = [
   {
     name: "Among Us",
     img: "https://cdn.jsdelivr.net/gh/mamayaya1/game@f3a882424a8f28d07bdf456b251d889725c4c1e4/projects/among-us/img/thumbnail.png",
     type: "amongus"
   },
   {
     name: "Study Group",
     img: "https://via.placeholder.com/300x169.png?text=Study+Group",
     url: "https://padlet.com/oojo1/study-group-k9w2oro6a6h0zkwh"
   }
   // No "Arthur's Nightmare" game object here, since we've removed it.
 ];

 // --- Grid builder ---
 function buildGrid(list) {
   const grid = document.getElementById('homeGrid');
   if (!grid) return;
   grid.innerHTML = '';
   if (!list.length) {
     grid.innerHTML = '<p style="color:#555;grid-column:1/-1;text-align:center;padding:40px 0;font-size:0.45rem;">No games found.</p>';
     return;
   }
   list.forEach(g => {
     const card = document.createElement('div');
     card.className = 'game-card';
     const imgTag = g.img
       ? `<img src="${g.img}" alt="${g.name}">`
       : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;">🎮</div>`;
     card.innerHTML = `
       <div class="game-thumb">
         ${imgTag}
         <div class="play-overlay">▶</div>
       </div>
       <div class="game-name">${g.name}</div>`;
     card.onclick = () => openGame(g);
     grid.appendChild(card);
   });
 }

 function searchGames(q) {
   const filtered = q.trim()
     ? games.filter(g => g.name.toLowerCase().includes(q.toLowerCase()))
     : games;
   buildGrid(filtered);
 }

 // --- Open/Close game ---
 let isFullscreen = false;
 function toggleFullscreen() {
   const iframe = document.getElementById('gameFrame');
   if (!isFullscreen) {
     if (iframe.requestFullscreen) iframe.requestFullscreen();
     else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
     else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
     isFullscreen = true;
   } else {
     if (document.exitFullscreen) document.exitFullscreen();
     else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
     else if (document.msExitFullscreen) document.msExitFullscreen();
     isFullscreen = false;
   }
 }

 async function openGame(g) {
   document.getElementById('gameTitle').textContent = g.name;
   const modal = document.getElementById('gameModal');
   const frame = document.getElementById('gameFrame');
   document.getElementById('fullscreenBtn').style.display = 'block';

   if (g.type === 'amongus') {
     frame.src = 'about:blank';
     modal.classList.add('open');
     document.getElementById('gameTitle').textContent = g.name + ' — Loading…';
     try {
       const url = await getAmongUsUrl();
       frame.src = url;
       document.getElementById('gameTitle').textContent = g.name;
     } catch (e) {
       frame.srcdoc = `<body style="background:#000;color:#fff;font-family:monospace;padding:40px;text-align:center"><h2>Failed to load game</h2><p>${e.message}</p></body>`;
       document.getElementById('gameTitle').textContent = g.name + ' — Error';
     }
   } else if (g.type === 'unity') {
     frame.src = g.url;
     modal.classList.add('open');
   } else {
     frame.src = g.url;
     modal.classList.add('open');
   }
 }

 function closeGame() {
   document.getElementById('gameFrame').src = '';
   document.getElementById('gameModal').classList.remove('open');
   isFullscreen = false;
 }

 window.onload = () => { buildGrid(games); };
</script>
</body>
</html>
